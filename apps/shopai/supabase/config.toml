[auth.external.google]
enabled = true
client_id = "662024017734-gqep6sm5c3urj4g2bcelheuek9v1tnp9.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false

[functions.cleanup-temp-files]
enabled = true
verify_jwt = false # Verification not needed for internal cron jobs
import_map = "./functions/cleanup-temp-files/deno.json" 
entrypoint = "./functions/cleanup-temp-files/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/cleanup-temp-files/*.html" ]

[functions.create_business_entity]
enabled = true
verify_jwt = true
import_map = "./functions/create_business_entity/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/create_business_entity/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/create_business_entity/*.html" ]
